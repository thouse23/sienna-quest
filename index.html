<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sienna's Tech Time Quest!</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦉</text></svg>">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Sienna's Quest">
    <meta name="apple-mobile-web-app-title" content="Sienna's Quest">
    <meta name="theme-color" content="#FF66B2">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF66B2;       
            --secondary: #FF99CC;     
            --dark-pink: #CC0066;     
            --success: #6BCB77;       
            --warning: #FFD93D;       
            --background: #FFF0F5;    
            --card-bg: #FFFFFF;
            --text: #4A2E35;          
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: var(--dark-pink);
            font-family: 'Comfortaa', cursive;
            font-size: 2.8rem;
            text-align: center;
            margin: 20px 0;
            text-shadow: 2px 2px 0px white;
        }

        .bank-section {
            background: white;
            border-radius: 40px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 102, 178, 0.2);
            border: 4px solid var(--primary);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .bank-section::before {
            content: '✨';
            position: absolute;
            top: 10px;
            left: 20px;
            font-size: 2rem;
        }

        .bank-section::after {
            content: '✨';
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 2rem;
        }

        .bank-label {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--dark-pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .bank-balance {
            font-family: 'Comfortaa', cursive;
            font-size: 8rem; 
            font-weight: 700;
            line-height: 1;
            color: var(--primary);
            margin: 10px 0;
            display: block;
            text-shadow: 4px 4px 0px #FFE6F2;
        }

        .bank-subtext {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 20px;
        }

        .withdraw-zone {
            background: var(--background);
            border-radius: 25px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        input[type="number"] {
            width: 100px;
            height: 60px;
            border-radius: 15px;
            border: 3px solid var(--primary);
            font-size: 2rem;
            text-align: center;
            font-family: inherit;
            font-weight: 600;
            color: var(--dark-pink);
        }

        .btn-use {
            background: var(--dark-pink);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0px #800040;
            transition: all 0.1s;
        }

        .btn-use:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #800040;
        }

        .tracker-header {
            font-size: 1.8rem;
            color: var(--dark-pink);
            margin-bottom: 15px;
            text-align: center;
        }

        .day-select {
            width: 100%;
            padding: 15px;
            font-size: 1.6rem;
            border-radius: 20px;
            border: 3px solid var(--primary);
            background: white;
            color: var(--dark-pink);
            font-weight: 600;
            margin-bottom: 25px;
            text-align: center;
            font-family: inherit;
        }

        .progress-wrapper {
            background: #FFE6F2;
            border-radius: 20px;
            height: 45px;
            width: 100%;
            margin-bottom: 30px;
            position: relative;
            border: 3px solid white;
            overflow: hidden;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .progress-fill {
            background: linear-gradient(90deg, #6BCB77, #4ED460);
            height: 100%;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .progress-label {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 600;
            font-size: 1.3rem;
            color: var(--text);
            z-index: 2;
        }

        .chore-card {
            background: white;
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 2px solid #FFE6F2;
        }

        .chore-row {
            display: flex;
            align-items: center;
            padding: 20px 0;
            border-bottom: 2px solid #FFF0F5;
            cursor: pointer;
        }

        .chore-row:last-child { border-bottom: none; }

        input[type="checkbox"] {
            width: 35px;
            height: 35px;
            margin-right: 20px;
            accent-color: var(--primary);
        }

        .chore-text {
            flex-grow: 1;
            font-size: 1.5rem;
            line-height: 1.3;
            font-weight: 400;
        }

        .chore-val {
            background: #FFE6F2;
            color: var(--dark-pink);
            padding: 8px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            white-space: nowrap;
        }

        .bonus-box {
            background: #FFFDF0;
            border: 4px dashed var(--warning);
        }

        .btn-deposit {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 25px;
            font-size: 1.6rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 0px #CC0066;
            margin: 20px 0 40px;
            font-family: inherit;
        }

        .btn-deposit:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0px #CC0066;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 Sienna's Quest 👑</h1>

    <div class="bank-section">
        <div class="bank-label">My Tech Vault</div>
        <div class="bank-balance" id="bankBalance">0</div>
        <div class="bank-subtext">Minutes to Play! 🎮</div>
        
        <div class="withdraw-zone">
            <input type="number" id="withdrawInput" placeholder="30">
            <button class="btn-use" onclick="withdraw()">USE TIME</button>
        </div>
    </div>

  <div class="tracker-header">Today's Missions</div>
    <select id="dayPicker" class="day-select" onchange="loadChores()">
        <option value="Monday">🌸 Monday 🌸</option>
        <option value="Tuesday">🌸 Tuesday 🌸</option>
        <option value="Wednesday">🌸 Wednesday 🌸</option>
        <option value="Thursday">🌸 Thursday 🌸</option>
        <option value="Friday">🌸 Friday 🌸</option>
        <option value="Saturday">🌸 Saturday 🌸</option>
        <option value="Sunday">🌸 Sunday 🌸</option>
    </select>

    <div class="progress-wrapper">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-label" id="progressLabel">0 / 60 mins</div>
    </div>

    <div class="chore-card" id="choreList"></div>
    
    <div class="chore-card bonus-box" id="bonusList"></div>

    <button class="btn-deposit" onclick="deposit()">🌟 DEPOSIT MY TIME! 🌟</button>
</div>

<script>
    // ==========================================
    // 1. DYNAMIC CHORE LISTS & MATH ENGINE
    // ==========================================
    const baseChores = [
        { t: "Make your bed 🛏️", m: 10 },
        { t: "Brush teeth and lotion up 🧼", m: 10 },
        { t: "Get dressed & put away PJs 👚", m: 10 }
    ];

    const chorePool = [
        { t: "Vacuum the living room 🧹", m: 10 },
        { t: "Empty the dishwasher 🍽️", m: 10 },
        { t: "Wipe down kitchen counters ✨", m: 10 },
        { t: "Take out the recycling ♻️", m: 10 },
        { t: "Dust bedroom shelves 💨", m: 10 },
        { t: "Water the indoor plants 🪴", m: 10 },
        { t: "Feed Luna her food 🐶", m: 10 },
        { t: "Clear dinner table 🍽️", m: 10 },
        { t: "Put away toys & books 🧸", m: 10 }
    ];

    const bonusChore = { t: "Water lawn with Mom/Dad 💦", m: 15 };

    function seededRandom(seed) {
        return function() {
            seed = (seed * 1664525 + 1013904223) % 4294967296;
            return seed / 4294967296;
        };
    }

    function getSiennasDailyChores(dayName) {
        const dayOffsets = { Monday: 1, Tuesday: 2, Wednesday: 3, Thursday: 4, Friday: 5, Saturday: 6, Sunday: 7 };
        const offset = dayOffsets[dayName] || 0;
        const d = new Date();
        const dateSeed = (d.getFullYear() * 10000) + ((d.getMonth() + 1) * 100) + d.getDate() + offset;
        const myRandom = seededRandom(dateSeed);
        const poolCopy = [...chorePool];
        const selectedPoolChores = [];
        while (selectedPoolChores.length < 3 && poolCopy.length > 0) {
            const randomIndex = Math.floor(myRandom() * poolCopy.length);
            const [chosenChore] = poolCopy.splice(randomIndex, 1);
            selectedPoolChores.push(chosenChore);
        }
        return [...baseChores, ...selectedPoolChores];
    }

    function loadChores() {
        const day = document.getElementById('dayPicker').value;
        const listDiv = document.getElementById('choreList');
        const bonusDiv = document.getElementById('bonusList');
        
        const currentList = getSiennasDailyChores(day);
        
        listDiv.innerHTML = '';
        bonusDiv.innerHTML = '';

        const saved = JSON.parse(localStorage.getItem('checks_' + day)) || {};

        currentList.forEach((item, i) => {
            const id = 'c' + i;
            const checked = saved[id] ? 'checked' : '';
            listDiv.innerHTML += `
                <div class="chore-row" onclick="toggle('${id}')">
                    <input type="checkbox" id="${id}" ${checked} data-mins="${item.m}" onclick="event.stopPropagation(); refreshProgress();">
                    <span class="chore-text">${item.t}</span>
                    <span class="chore-val">+${item.m}m</span>
                </div>`;
        });

        const bChecked = saved['bonus'] ? 'checked' : '';
        bonusDiv.innerHTML = `
            <div class="chore-row" onclick="toggle('bonus')">
                <input type="checkbox" id="bonus" ${bChecked} data-mins="${bonusChore.m}" onclick="event.stopPropagation(); refreshProgress();">
                <span class="chore-text"><strong>🚀 BONUS:</strong> ${bonusChore.t}</span>
                <span class="chore-val">+${bonusChore.m}m</span>
            </div>`;
        
        refreshProgress();
    }
    
    // ==========================================
    // 2. CORE APPLICATION STATE
    // ==========================================
    let bankValue = parseInt(localStorage.getItem('siennaBank')) || 0;
    let today = new Date().toLocaleString('en-us', {weekday:'long'});
    
    const validDays = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
    if (!validDays.includes(today)) today = "Monday";
    document.getElementById('dayPicker').value = today;

    function saveBank() {
        localStorage.setItem('siennaBank', bankValue);
        document.getElementById('bankBalance').innerText = bankValue;
    }

    // ==========================================
    // 3. UI RENDERING & LOGIC
    // ==========================================
    function loadChores() {
        const day = document.getElementById('dayPicker').value;
        const listDiv = document.getElementById('choreList');
        const bonusDiv = document.getElementById('bonusList');
        
        const currentList = getSiennasDailyChores(day);
        
        listDiv.innerHTML = '';
        bonusDiv.innerHTML = '';

        const saved = JSON.parse(localStorage.getItem('checks_' + day)) || {};

        currentList.forEach((item, i) => {
            const id = 'c' + i;
            const checked = saved[id] ? 'checked' : '';
            listDiv.innerHTML += `
                <div class="chore-row" onclick="toggle('${id}')">
                    <input type="checkbox" id="${id}" ${checked} data-mins="${item.m}" onclick="event.stopPropagation(); refreshProgress();">
                    <span class="chore-text">${item.t}</span>
                    <span class="chore-val">+${item.m}m</span>
                </div>`;
        });

        const bChecked = saved['bonus'] ? 'checked' : '';
        bonusDiv.innerHTML = `
            <div class="chore-row" onclick="toggle('bonus')">
                <input type="checkbox" id="bonus" ${bChecked} data-mins="${bonusChore.m}" onclick="event.stopPropagation(); refreshProgress();">
                <span class="chore-text"><strong>🚀 BONUS:</strong> ${bonusChore.t}</span>
                <span class="chore-val">+${bonusChore.m}m</span>
            </div>`;
        
        refreshProgress();
    }

    function toggle(id) {
        const cb = document.getElementById(id);
        if (cb) {
            cb.checked = !cb.checked;
            refreshProgress();
        }
    }

    function refreshProgress() {
        const day = document.getElementById('dayPicker').value;
        const checks = {};
        
        let totalPossibleReg = 0;
        let earnedReg = 0;
        let earnedBon = 0;

        document.querySelectorAll('#choreList input').forEach(i => {
            checks[i.id] = i.checked;
            const mins = parseInt(i.getAttribute('data-mins')) || 0;
            totalPossibleReg += mins;
            if(i.checked) earnedReg += mins;
        });

        const b = document.getElementById('bonus');
        if (b) {
            checks['bonus'] = b.checked;
            const bMins = parseInt(b.getAttribute('data-mins')) || 0;
            if(b.checked) earnedBon += bMins;
        }

        localStorage.setItem('checks_' + day, JSON.stringify(checks));
        
        const targetGoal = totalPossibleReg || 60; 
        const pct = Math.min((earnedReg / targetGoal) * 100, 100);
        
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressLabel').innerText = `${earnedReg} / ${targetGoal} mins` + (earnedBon > 0 ? ` (+${earnedBon}m Bonus!)` : "");
        
        return (earnedReg + earnedBon);
    }

    function deposit() {
        const amt = refreshProgress();
        if(amt === 0) return alert("Do some chores first, Sienna!");
        
        if(confirm("Ready to move " + amt + " minutes into your Vault?")) {
            bankValue += amt;
            saveBank();
            const day = document.getElementById('dayPicker').value;
            localStorage.removeItem('checks_' + day);
            loadChores();
        }
    }

    function withdraw() {
        const val = parseInt(document.getElementById('withdrawInput').value);
        if(!val || val <= 0) return alert("How many minutes are you using?");
        if(val > bankValue) return alert("Not enough minutes yet! Do some more chores.");
        
        if(confirm("Use " + val + " minutes now?")) {
            bankValue -= val;
            saveBank();
            document.getElementById('withdrawInput').value = '';
        }
    }

    saveBank();
   


        const bChecked = saved['bonus'] ? 'checked' : '';
        bonusDiv.innerHTML = `
            <div class="chore-row" onclick="toggle('bonus')">
                <input type="checkbox" id="bonus" ${bChecked} data-mins="${data.bonus.m}" onclick="event.stopPropagation(); refreshProgress();">
                <span class="chore-text"><strong>🚀 BONUS:</strong> ${data.bonus.t}</span>
                <span class="chore-val">+${data.bonus.m}m</span>
            </div>`;
        
        refreshProgress();
    

    function toggle(id) {
        const cb = document.getElementById(id);
        if (cb) {
            cb.checked = !cb.checked;
            refreshProgress();
        }
    }

    function refreshProgress() {
        const day = document.getElementById('dayPicker').value;
        const checks = {};
        
        let totalPossibleReg = 0;
        let earnedReg = 0;
        let earnedBon = 0;

        document.querySelectorAll('#choreList input').forEach(i => {
            checks[i.id] = i.checked;
            const mins = parseInt(i.getAttribute('data-mins')) || 0;
            totalPossibleReg += mins;
            if(i.checked) earnedReg += mins;
        });

        const b = document.getElementById('bonus');
        if (b) {
            checks['bonus'] = b.checked;
            const bMins = parseInt(b.getAttribute('data-mins')) || 0;
            if(b.checked) earnedBon += bMins;
        }

        localStorage.setItem('checks_' + day, JSON.stringify(checks));
        
        const targetGoal = totalPossibleReg || 60; 
        const pct = Math.min((earnedReg / targetGoal) * 100, 100);
        
        document.getElementById('progressFill').style.width = pct + '%';
        document.getElementById('progressLabel').innerText = `${earnedReg} / ${targetGoal} mins` + (earnedBon > 0 ? ` (+${earnedBon}m Bonus!)` : "");
        
        return (earnedReg + earnedBon);
    }

    function deposit() {
        const amt = refreshProgress();
        if(amt === 0) return alert("Do some chores first, Sienna!");
        
        if(confirm("Ready to move " + amt + " minutes into your Vault?")) {
            bankValue += amt;
            saveBank();
            const day = document.getElementById('dayPicker').value;
            localStorage.removeItem('checks_' + day);
            loadChores();
        }
    }

    function withdraw() {
        const val = parseInt(document.getElementById('withdrawInput').value);
        if(!val || val <= 0) return alert("How many minutes are you using?");
        if(val > bankValue) return alert("Not enough minutes yet! Do some more chores.");
        
        if(confirm("Use " + val + " minutes now?")) {
            bankValue -= val;
            saveBank();
            document.getElementById('withdrawInput').value = '';
        }
    }

    saveBank();
    loadChores();
</script>

</body>
</html>
